<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Gestionnaire de Tâches</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Gestionnaire de Tâches</h1>
            <p class="counter-text"><span id="taskCounter">0</span> tâches restantes</p>
        </header>
        
        <form id="taskForm" class="input-group">
            <input type="text" id="taskInput" placeholder="Saisir une tâche..." autocomplete="off">
            <button type="submit" id="addTaskBtn">Ajouter</button>
        </form>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">Toutes</button>
            <button class="filter-btn" data-filter="active">Actives</button>
            <button class="filter-btn" data-filter="completed">Terminées</button>
        </div>

        <ul id="taskList">
        </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
